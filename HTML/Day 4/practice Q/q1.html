<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <table border="1">
        <caption>Students</caption>

    <!-- thead, tbody, tfoot are the sementics in  table-->
    <!-- table header-->

    <thead>
    <tr>
        <th>Name</th>
        <th>Contri</th>
    </tr>
    </thead>

        <!-- table body-->

    <tbody>
    <tr>
        <td>Tushar</td>
        <td>50</td>
    </tr>
    <tr>
        <td>ANand</td>
        <td>100</td>
    </tr>
    <tr>
        <td>Roshan</td>
        <td>100</td>
    </tr>
    <tr>
        <td>Raj</td>
        <td>1000</td>
    </tr>
    </tbody>

        <!-- table footer-->
         
    <tfoot>
        <tr>
            <td>Total Contri</td>
            <td>1250</td>
        </tr>
    </tfoot>
    </table>
</body>
</html>
