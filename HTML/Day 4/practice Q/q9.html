<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
</head>

<body>
    <form action="/server">
        <h1>Registration Form</h1>
        <div>
            <input type="text" placeholder="Frist Name" name="fname">
            <input type="text" placeholder="Last Name" name="lname">
        </div>

        <div>
            <label for="gender">Please select gender:</label>
            <select name="gender" id="gender">
                <option value="" disabled>Choose correct option</option>
                <option value="male" selected>Male</option>
                <option value="female">Female</option>
                <option value="others">other</option>
            </select>
        </div>
        <div>
            Do you agree to all terms of service?
            <input type="checkbox" name="terms" id="conditions">
            <label for="conditions">Yes, i agree</label>
        </div>
        <button>Submit</button>
    </form>
</body>

</html>
