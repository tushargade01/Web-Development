<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<body>
    <form action="/server">
        <h1>Feedback Form</h1>
        <br>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="write your name">
        <br>
        <br>
        <lable for="Email">Email</lable>
        <input type="email" id="email" name="email" placeholder="write your email">
        <br>
        <br>
        <label for="msg">Message</label> <br>
        <textarea name="message" id="msg" rows="3" cols="30"></textarea>
        <br>
        <br>
        <label for="rating">rate us our of 5:</label>
        <br>
        <input type="radio" id="1" name="rating" value="1"><label for="1">1</label> <br>
        <input type="radio" id="2" name="rating" value="2"><label for="2">2</label> <br>
        <input type="radio" id="3" name="rating" value="3"><label for="3">3</label> <br>
        <input type="radio" id="4" name="rating" value="4"><label for="4">4</label> <br>
        <input type="radio" id="5" name="rating" value="5"><label for="5">5</label> <br>
        <br>
        <button>send your message!</button>
    </form>
</body>
</html>
