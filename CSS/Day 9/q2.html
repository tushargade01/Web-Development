<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>q2</title>
    <style>
        .container {
            height: 50px;
            width: 900px;
            border: solid 2px skyblue;
            border-radius: 10px;
            background-color: pink;
            display: flex;
            align-items: center;
        }
        #logo{
            margin-right: 30px;
        }
        .child {
            font-size: 24px;
            color: black;
            margin-left: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="logo" class="child">logo</div>
        <div class="child">Home</div>
        <div class="child">About</div>
        <div class="child">Contact</div>
    </div>
</body>
</html>
